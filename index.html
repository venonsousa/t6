<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENON</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  background: url('https://xatimg.com/image/2z709uX4q7li.gif') no-repeat center center fixed;
  background-size: cover;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.wrapper { display:flex; gap:20px; }

.container, .side {
  background:#111;
  border-radius:20px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.container {
  padding:30px;
  width:320px;
  text-align:center;
}

.side {
  padding:20px;
  width:260px;
  overflow:hidden;
  position:relative;
}

.avatar {
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #ff0066;
  margin-bottom:15px;
}

.btn {
  background:#ff0066;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.btn:hover {
  background:#ff3385;
  transform:scale(1.05);
}

/* 🔥 ANIMAÇÃO */
.fade {
  animation:fadeSlide .4s ease;
}

@keyframes fadeSlide {
  from {
    opacity:0;
    transform:translateX(20px);
  }
  to {
    opacity:1;
    transform:translateX(0);
  }
}

.friend {
  display:flex;
  align-items:center;
  gap:10px;
  background:#1a1a1a;
  padding:8px;
  border-radius:10px;
  margin-top:10px;
}

.friend img {
  width:40px;
  height:40px;
  border-radius:50%;
}

iframe {
  width:100%;
  height:200px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

.status {
  font-size:13px;
  color:#aaa;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- PRINCIPAL -->
  <div class="container">
    <img src="https://xatimg.com/image/kErK5bMRoXle.gif" class="avatar">
    <h1>iiCarvaozim</h1>

    <div class="btn" onclick="abrirOferta()">OFERTA</div>
    <div class="btn" onclick="abrirChat()">CHAT</div>
    <div class="btn" onclick="abrirAmigos()">AMIGOS</div>
    <div class="btn" onclick="abrirSite()">SITE</div>
  </div>

  <!-- PAINEL -->
  <div class="side" id="painelLateral">
    <div id="conteudoPadrao" class="fade">
      <h2>Painel</h2>
      <div class="status">Bem-vindo 🔥</div>
    </div>
  </div>

</div>

<script>

function trocarConteudo(html) {
  let painel = document.getElementById('painelLateral');

  painel.innerHTML = `<div class="fade">${html}</div>`;
}

// 🔥 BOTÕES

function abrirAmigos() {
  trocarConteudo(`
    <h2>👥 Amigos</h2>

    <div class="friend">
      <img src="https://via.placeholder.com/40">
      <span>Julia</span>
    </div>

    <div class="friend">
      <img src="https://via.placeholder.com/40">
      <span>Carlos VIP</span>
    </div>
  `);
}

function abrirOferta() {
  trocarConteudo(`
    <h2>🔥 Oferta</h2>
    <div class="status">
      Você está a um passo de desbloquear tudo...
    </div>

    <div class="btn" onclick="window.open('https://google.com')">
      CONTINUAR
    </div>
  `);
}

function abrirChat() {
  trocarConteudo(`
    <h2>💬 Chat</h2>
    <div class="status">Atendimento em andamento...</div>
  `);
}

// 🔥 CONTEÚDO EXTERNO (IFRAME)
function abrirSite() {
  trocarConteudo(`
    <h2>🌐 Site</h2>

    <iframe src="https://example.com"></iframe>
  `);
}

</script>

</body>
</html>
