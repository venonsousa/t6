<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Secreto</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: #fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container {
      background:#111;
      padding:30px;
      border-radius:20px;
      text-align:center;
      width:350px;
      box-shadow:0 0 30px rgba(255,0,100,0.3);
    }

    .avatar {
      width:120px;
      height:120px;
      border-radius:50%;
      border:3px solid #ff0066;
      margin-bottom:15px;
    }

    h1 {
      font-size:22px;
      margin-bottom:10px;
    }

    p {
      font-size:14px;
      color:#ccc;
      margin-bottom:20px;
    }

    .btn {
      display:block;
      background:#ff0066;
      color:#fff;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
      cursor:pointer;
    }

    .btn:hover {
      background:#ff3385;
      transform:scale(1.05);
    }

    .hidden {
      display:none;
      margin-top:15px;
    }

    .friend {
      display:flex;
      align-items:center;
      gap:10px;
      background:#1a1a1a;
      padding:8px;
      border-radius:10px;
      margin-top:10px;
    }

    .friend img {
      width:40px;
      height:40px;
      border-radius:50%;
    }

  </style>
</head>
<body>

<div class="container">
  <img src="https://xatimg.com/image/kErK5bMRoXle.gif" class="avatar">
  <h1>Área Proibida 🔥</h1>
  <p>Conteúdo secreto que faz qualquer pessoa ficar OBCECADA por você em minutos</p>

  <a href="#" class="btn">Quero Acesso Agora 🔥</a>
  <a href="#" class="btn">Falar no Privado 💬</a>

  <div class="btn" onclick="mostrarAmigos()">Amigos 👥</div>

  <div id="listaAmigos" class="hidden">
    <div class="friend">
      <img src="https://via.placeholder.com/40">
      <span>Nome do Amigo 1</span>
    </div>

    <div class="friend">
      <img src="https://via.placeholder.com/40">
      <span>Nome do Amigo 2</span>
    </div>

    <!-- DUPLICA ISSO PRA ADICIONAR MAIS -->
    <!--
    <div class="friend">
      <img src="LINK_DA_FOTO">
      <span>NOME DO AMIGO</span>
    </div>
    -->

  </div>
</div>

<script>
  function mostrarAmigos() {
    let lista = document.getElementById('listaAmigos');
    lista.style.display = lista.style.display === 'block' ? 'none' : 'block';
  }
</script>

</body>
</html>
